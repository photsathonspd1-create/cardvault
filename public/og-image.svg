<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1a"/>
      <stop offset="50%" style="stop-color:#1a0e2e"/>
      <stop offset="100%" style="stop-color:#0f0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  
  <!-- Glow orbs -->
  <circle cx="200" cy="150" r="200" fill="#7c3aed" opacity="0.08"/>
  <circle cx="1000" cy="480" r="250" fill="#a855f7" opacity="0.06"/>
  
  <!-- Left: Card illustration -->
  <g transform="translate(80, 140)">
    <!-- Card back -->
    <rect x="0" y="0" width="200" height="280" rx="12" fill="#1e1b4b" stroke="url(#accent)" stroke-width="2"/>
    <rect x="16" y="16" width="168" height="248" rx="8" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
    <circle cx="100" cy="140" r="40" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>
    <text x="100" y="155" font-family="Arial,sans-serif" font-weight="900" font-size="32" fill="url(#gold)" text-anchor="middle" opacity="0.8">CV</text>
  </g>
  
  <!-- Right: Another card (slightly rotated) -->
  <g transform="translate(180, 160) rotate(8, 100, 140)">
    <rect x="0" y="0" width="200" height="280" rx="12" fill="#1e1b4b" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
    <rect x="16" y="16" width="168" height="248" rx="8" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Text content -->
  <text x="600" y="220" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="72" fill="white" text-anchor="middle">CardVault</text>
  
  <!-- Tagline -->
  <text x="600" y="290" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="28" fill="#a78bfa" text-anchor="middle">ตลาดซื้อ-ขายการ์ด TCG อันดับ 1 ของไทย</text>
  
  <!-- Divider -->
  <rect x="450" y="320" width="300" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>
  
  <!-- Features -->
  <text x="600" y="380" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="24" fill="#d4d4d8" text-anchor="middle">🛡️ ระบบ Escrow คุ้มครองทุกคำสั่งซื้อ</text>
  <text x="600" y="420" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="20" fill="#a1a1aa" text-anchor="middle">Pokemon · Yu-Gi-Oh! · MTG · One Piece</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.15"/>
  <text x="600" y="612" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="18" fill="#a78bfa" text-anchor="middle">cardvault-drab.vercel.app</text>
</svg>
